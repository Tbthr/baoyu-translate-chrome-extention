<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-header">
    <span class="popup-title">Baoyu Translate</span>
  </div>

  <div class="segmented-control" id="mode-control">
    <button class="seg-btn" data-mode="quick">
      快翻
      <div class="tooltip">
        <div class="flow">
          <span class="flow-step">翻译</span>
          <span class="flow-arrow">→</span>
          <span class="flow-step">输出</span>
        </div>
        <div class="feature">直接翻译全文，不分批不分段。适合短文本、即时翻译场景。</div>
      </div>
    </button>
    <button class="seg-btn active" data-mode="normal">
      普通
      <div class="tooltip">
        <div class="flow">
          <span class="flow-step">分析</span>
          <span class="flow-arrow">→</span>
          <span class="flow-step">翻译</span>
          <span class="flow-arrow">→</span>
          <span class="flow-step">输出</span>
        </div>
        <div class="feature">先分析文章领域、术语和翻译难点，再基于分析结果进行翻译。适合大多数文章和博客。</div>
      </div>
    </button>
    <button class="seg-btn" data-mode="refined">
      精翻
      <div class="tooltip">
        <div class="flow">
          <span class="flow-step">分析</span>
          <span class="flow-arrow">→</span>
          <span class="flow-step">翻译</span>
          <span class="flow-arrow">→</span>
          <span class="flow-step">审校</span>
          <span class="flow-arrow">→</span>
          <span class="flow-step">润色</span>
        </div>
        <div class="feature">四步精修流程：先翻译初稿，再逐段审校准确性、检查翻译腔，最后润色至出版级质量。适合重要文档。</div>
      </div>
    </button>
  </div>

  <div class="field-group">
    <div class="field-label">AI 服务</div>
    <div class="custom-select" id="provider-select">
      <div class="select-trigger" id="select-trigger">
        <div class="provider-info">
          <span class="provider-dot" id="trigger-dot"></span>
          <span class="provider-name" id="trigger-name">加载中...</span>
          <span class="provider-model" id="trigger-model"></span>
        </div>
        <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M4 6l4 4 4-4"/>
        </svg>
      </div>
      <div class="select-dropdown" id="provider-dropdown"></div>
    </div>
  </div>

  <button class="more-settings-toggle" id="more-toggle">
    <span class="arrow">▶</span> 更多设置
  </button>
  <div class="more-settings" id="more-settings">
    <div class="field-group">
      <div class="field-label">Base URL</div>
      <input type="text" id="input-base-url">
      <div class="input-hint">OpenAI 兼容格式的 API 地址</div>
    </div>
    <div class="field-group">
      <div class="field-label">API Key</div>
      <div class="input-with-action">
        <input type="password" id="input-api-key">
        <button class="input-action-btn" id="eye-btn" title="显示/隐藏">
          <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="field-group">
      <div class="field-label">Model</div>
      <input type="text" id="input-model">
    </div>
  </div>

  <button class="translate-btn" id="translate-btn">翻译</button>

  <div class="status-bar">
    <span class="status-dot ready" id="status-dot"></span>
    <span id="status-text">就绪</span>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
